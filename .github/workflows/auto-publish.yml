name: Hourly AI Post Generation

# Vercel Hobby 플랜은 cron을 하루 1회만 허용하므로,
# 더 자주 발행하려면 GitHub Actions (무료, 매시간 가능) 으로 endpoint를 호출합니다.
#
# 호출 대상: /api/cron/generate-post
#   → DB의 키워드 중 가장 적게 사용된 1개를 골라 Gemini로 글 생성·발행
#
# 필수 GitHub Secrets:
#   - SITE_URL: 배포된 사이트 URL (예: https://your-blog.vercel.app)
#   - CRON_SECRET: 라우트 인증용 Bearer 토큰 (Vercel env에도 동일하게 등록)

on:
  schedule:
    # UTC 기준 매시간 (한국 시간은 +9). KST 9~21시 발행을 원하면 UTC 0-12시
    - cron: '0 0-12 * * *'
  workflow_dispatch: # 수동 실행도 허용

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger AI generation endpoint
        run: |
          response=$(curl -s -o /tmp/body.json -w "%{http_code}" -X POST \
            "${{ secrets.SITE_URL }}/api/cron/generate-post" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")
          echo "HTTP status: $response"
          cat /tmp/body.json || true
          if [ "$response" -ge 500 ]; then
            echo "Server error occurred"
            exit 1
          fi
